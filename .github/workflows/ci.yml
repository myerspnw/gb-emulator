name: CI

on:
  push:
    # Run on every branch so WIP commits get CI feedback before opening a PR.
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on the same ref when a new commit is pushed.
# Saves CI minutes; the older run's results would be stale anyway.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Upper bound on job duration. Our jobs typically run 3-8 minutes;
    # 30 is comfortable headroom that still bounds a hung build.
    timeout-minutes: 30
    strategy:
      # Don't cancel other jobs if one fails. We want to see all failures
      # at once, not bisect by re-running.
      fail-fast: false
      matrix:
        include:
          # Minimum supported gcc (per CONTRIBUTING.md). Guards against
          # silently using features only available in newer gcc.
          - name: Linux / gcc-13 (min) / debug
            os: ubuntu-24.04
            preset: debug
            cc: gcc-13
            cxx: g++-13

          - name: Linux / gcc-14 / debug
            os: ubuntu-24.04
            preset: debug
            cc: gcc-14
            cxx: g++-14

          - name: Linux / gcc-14 / release
            os: ubuntu-24.04
            preset: release
            cc: gcc-14
            cxx: g++-14

          # Minimum supported clang (per CONTRIBUTING.md). Same purpose
          # as the gcc-13 lane.
          - name: Linux / clang-16 (min) / debug
            os: ubuntu-24.04
            preset: debug
            cc: clang-16
            cxx: clang++-16

          - name: Linux / clang-18 / debug
            os: ubuntu-24.04
            preset: debug
            cc: clang-18
            cxx: clang++-18

          # Release-clang catches optimizer-only warnings that the
          # gcc-release lane doesn't surface.
          - name: Linux / clang-18 / release
            os: ubuntu-24.04
            preset: release
            cc: clang-18
            cxx: clang++-18

          - name: Linux / clang-18 / asan + ubsan
            os: ubuntu-24.04
            preset: asan
            cc: clang-18
            cxx: clang++-18

          - name: macOS / Apple clang / debug
            os: macos-latest
            preset: debug
            cc: clang
            cxx: clang++

          - name: macOS / Apple clang / release
            os: macos-latest
            preset: release
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      # Share FetchContent downloads across CI runs via the cache below.
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.fetchcontent-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        # cmake, ninja, gcc, clang, lld, ccache are pre-installed on
        # ubuntu-24.04 runners. We only need SDL3's transitive system
        # dependencies (X11, Wayland, ALSA, etc.) for the FetchContent
        # build of SDL3 to succeed.
        # --no-install-recommends keeps the install footprint small and
        # is the standard CI hygiene flag.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev \
            libdecor-0-dev libegl1-mesa-dev libgles2-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev \
            libibus-1.0-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        # cmake and ninja are pre-installed on macos-latest runners.
        # Only ccache needs installing.
        run: brew install ccache

      - name: Configure ccache
        # Set up ccache environment. CMakeLists.txt auto-detects ccache via
        # find_program and sets CMAKE_CXX_COMPILER_LAUNCHER, so no extra
        # CMake flags are needed here.
        shell: bash
        run: |
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=500M"                        >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=1"                          >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          # One cache per matrix entry. Compiler + preset ensures we don't
          # share across configurations with different flags or build types.
          key: ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.preset }}-

      - name: Cache FetchContent downloads
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.fetchcontent-cache
          # Recreate cache when dependency versions change.
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: Verify compiler version
        run: |
          ${{ matrix.cxx }} --version
          cmake --version
          ninja --version

      - name: Configure
        # Pass critical options explicitly rather than relying on defaults.
        # This guards against silent CI behavior changes if the option
        # defaults in CMakeLists.txt are ever flipped.
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DGBE_BUILD_TESTS=ON \
            -DGBE_ENABLE_WERROR=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        # Use --test-dir rather than --preset so we don't depend on every
        # build preset having a matching test preset defined.
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
        env:
          # Make sanitizer reports include stack traces and abort
          # on first error, so CI logs are clear and unambiguous.
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1:detect_stack_use_after_return=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:abort_on_error=1

      - name: ccache stats
        # Always run, even if tests failed, so we can see cache effectiveness.
        # Safe to run unconditionally — ccache is pre-installed on Linux runners
        # and installed via brew on macOS. Falls back gracefully if missing.
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats --verbose
          else
            echo "ccache not available; skipping stats"
          fi
